<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soroush — Français avec Hoda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700&family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    :root {
      --navy:      #0d1b2a;
      --navy-mid:  #1b2e45;
      --navy-soft: #2c4a6e;
      --blue:      #1565c0;
      --blue-soft: #1976d2;
      --blue-pale: #e3f2fd;
      --blue-mist: #f0f7ff;
      --paper:     #f8fafc;
      --ink:       #1a2332;
      --gray:      #64748b;
      --line:      #cbd5e1;
      --white:     #ffffff;
      --accent:    #0288d1;
    }

    body {
      font-family: 'Estedad', 'Tahoma', sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      line-height: 1.9;
      min-height: 100vh;
    }

    /* خطوط مهندسی ظریف */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1;
      background-image:
        repeating-linear-gradient(transparent, transparent 39px, rgba(13,27,42,0.04) 39px, rgba(13,27,42,0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(13,27,42,0.02) 39px, rgba(13,27,42,0.02) 40px);
      pointer-events: none;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: var(--navy);
      border-bottom: 3px solid var(--blue);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar .logo {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--blue); display: flex; align-items: center;
      justify-content: center; font-size: 20px; color: white;
      font-weight: 700; letter-spacing: -1px;
      font-family: 'Roboto', sans-serif;
    }
    .topbar h1 {
      font-family: 'Roboto', sans-serif;
      font-size: 22px; font-weight: 700;
      color: white; letter-spacing: 0.5px;
    }
    .topbar .sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 1px; }
    .topbar-right { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

    /* ── HERO ── */
    .hero {
      min-height: calc(100vh - 75px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 24px;
      position: relative; z-index: 1;
      transition: min-height 0.4s ease;
    }
    .hero.shrink { min-height: auto; padding: 32px 24px 16px; }
    .hero.hidden { display: none; }

    .hero-tag {
      font-size: 11px; font-weight: 700; color: var(--blue);
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px;
    }
    .hero h2 {
      font-family: 'Roboto', sans-serif;
      font-size: 52px; font-weight: 700; color: var(--navy);
      letter-spacing: -2px; margin-bottom: 10px; line-height: 1.2;
    }
    .hero .sub-fa { font-size: 18px; color: var(--gray); margin-bottom: 6px; }
    .hero .sub-fr {
      font-family: 'Roboto', sans-serif; font-size: 22px;
      color: var(--blue-soft); font-weight: 600; font-style: italic;
      margin-bottom: 36px;
    }

    /* ── SEARCH ── */
    .search-box { width: 100%; max-width: 520px; position: relative; margin-bottom: 36px; }
    .search-box input {
      width: 100%; padding: 16px 50px 16px 20px;
      font-size: 15px; border: 2px solid var(--line);
      border-radius: 8px; font-family: inherit;
      background: var(--white); color: var(--ink);
      transition: all 0.2s;
    }
    .search-box input:focus { outline: none; border-color: var(--blue); box-shadow: 0 4px 16px rgba(21,101,192,0.12); }
    .search-box::before { content: "🔍"; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 18px; opacity: 0.4; }

    /* ── CATEGORY CARDS ── */
    .cat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; max-width: 600px; width: 100%; }

    .cat-chip {
      display: flex; align-items: center; gap: 16px;
      background: var(--white); border: 2px solid var(--line);
      border-radius: 10px; padding: 20px 18px;
      cursor: pointer; transition: all 0.25s ease;
      font-family: inherit; position: relative; overflow: hidden; text-align: right;
    }
    .cat-chip::after {
      content: ""; position: absolute; top: 0; right: 0; bottom: 0;
      width: 4px; background: var(--c, var(--blue)); transition: width 0.25s;
    }
    .cat-chip:hover { border-color: var(--c, var(--blue)); transform: translateY(-3px); box-shadow: 0 10px 28px rgba(13,27,42,0.1); }
    .cat-chip:hover::after { width: 7px; }
    .cat-chip .chip-icon {
      width: 44px; height: 44px; border-radius: 8px;
      background: var(--blue-pale); display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0; transition: all 0.25s;
    }
    .cat-chip:hover .chip-icon { background: var(--c, var(--blue)); }
    .cat-chip .chip-body { text-align: right; }
    .cat-chip .name { font-size: 15px; font-weight: 600; color: var(--navy); line-height: 1.4; }
    .cat-chip .num { font-size: 11px; color: var(--gray); margin-top: 2px; }

    /* ── LIBRARY VIEW ── */
    .library { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; display: none; }
    .library.active { display: block; }

    .lib-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 26px; padding-bottom: 16px;
      border-bottom: 2px solid var(--line);
    }
    .lib-back {
      background: var(--blue-pale); border: none; color: var(--blue-soft);
      font-size: 20px; width: 40px; height: 40px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-family: inherit;
    }
    .lib-back:hover { background: var(--blue); color: white; }
    .lib-title { font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: 700; color: var(--navy); }
    .lib-count { font-size: 12px; color: var(--gray); margin-top: 2px; }

    /* ── CONTENT CARDS ── */
    .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 18px; }

    .content-card {
      background: var(--white); border: 2px solid var(--line);
      border-radius: 12px; overflow: hidden; text-decoration: none;
      color: inherit; transition: all 0.25s; display: flex; flex-direction: column;
      box-shadow: 0 2px 8px rgba(13,27,42,0.05);
    }
    .content-card:hover { transform: translateY(-4px); box-shadow: 0 14px 32px rgba(13,27,42,0.12); border-color: var(--blue); }

    .card-thumb {
      height: 110px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; background: var(--blue-mist); position: relative;
    }
    .card-level {
      position: absolute; top: 10px; left: 10px;
      background: var(--navy); color: white;
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 4px; letter-spacing: 1px;
    }
    .card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; text-align: right; }
    .card-cat { font-size: 10px; font-weight: 700; color: var(--blue); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    .card-title { font-size: 15px; font-weight: 700; color: var(--navy); line-height: 1.45; margin-bottom: 5px; }
    .card-title-fr { font-family: 'Roboto', sans-serif; font-size: 12px; color: var(--gray); font-style: italic; margin-bottom: 12px; flex: 1; }
    .card-go { font-size: 12px; font-weight: 700; color: var(--blue); margin-top: auto; padding-top: 10px; border-top: 1px solid var(--line); }

    /* ── EDITO-STYLE GROUP VIEW ── */
    .group-card {
      background: var(--white); border: 2px solid var(--line); border-radius: 12px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(13,27,42,0.05); margin-bottom: 16px;
    }
    .group-header {
      background: var(--navy); padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .group-header .g-icon { font-size: 24px; }
    .group-header .g-title { font-size: 17px; font-weight: 700; color: white; font-family: 'Roboto', sans-serif; }
    .group-header .g-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .group-items { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .group-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border-radius: 8px; text-decoration: none; transition: all 0.2s;
    }
    .group-item.available { background: var(--blue-mist); border: 1px solid #bfdbfe; }
    .group-item.available:hover { background: var(--blue-pale); transform: translateX(-4px); }
    .group-item.locked { background: var(--paper); opacity: 0.5; cursor: not-allowed; border: 1px solid var(--line); }
    .group-item .gi-icon { font-size: 16px; }
    .group-item .gi-title { font-size: 14px; font-weight: 600; color: var(--navy); flex: 1; }
    .group-item .gi-arrow { color: var(--blue); font-weight: 700; font-size: 14px; }

    /* ── SEARCH RESULTS ── */
    .search-results { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; display: none; }
    .search-results.active { display: block; }
    .sr-title { font-size: 17px; font-weight: 600; color: var(--navy); margin-bottom: 18px; }

    /* ── FOOTER ── */
    .footer {
      text-align: center; padding: 24px;
      border-top: 2px solid var(--line);
      font-size: 12px; color: var(--gray);
    }
    .footer span { color: var(--navy); font-weight: 700; }

    /* SCROLL UP */
    #scrollBtn {
      display: none; position: fixed; bottom: 22px; right: 22px;
      background: var(--navy); color: white; border: none; padding: 12px 15px;
      border-radius: 8px; cursor: pointer; font-size: 18px;
      box-shadow: 0 4px 14px rgba(13,27,42,0.3); z-index: 1000; transition: all 0.3s;
    }
    #scrollBtn:hover { background: var(--blue); transform: translateY(-3px); }
    #scrollBtn.show { display: block; }

    @media (max-width: 640px) {
      .hero h2 { font-size: 34px; }
      .cat-grid { grid-template-columns: 1fr; max-width: 380px; }
      .topbar { padding: 12px 16px; }
      .topbar h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">S</div>
    <div>
      <h1>Soroush</h1>
      <div class="sub">Architecte · Apprenant de français</div>
    </div>
  </div>
  <div class="topbar-right">Français avec Hoda</div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-tag">✦ Espace d'apprentissage personnel ✦</div>
  <h2>Bienvenue, Soroush</h2>
  <p class="sub-fa">فضای یادگیری اختصاصی تو</p>
  <p class="sub-fr">Construis ton français, pierre par pierre.</p>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="جستجو در محتوا..." oninput="handleSearch(this.value)">
  </div>

  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- LIBRARY -->
<div class="library" id="library">
  <div class="lib-header">
    <button class="lib-back" onclick="goHome()">←</button>
    <div>
      <div class="lib-title" id="libTitle"></div>
      <div class="lib-count" id="libCount"></div>
    </div>
  </div>
  <div id="contentGrid"></div>
</div>

<!-- SEARCH RESULTS -->
<div class="search-results" id="searchResults">
  <div class="sr-title" id="srTitle"></div>
  <div class="content-grid" id="searchGrid"></div>
</div>

<div class="footer">
  <span>Soroush</span> · Français avec Hoda · © 2025
</div>

<button id="scrollBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const CATEGORIES = [
  { id: "grammaire",      label: "Grammaire",       icon: "§",  color: "#1565c0" },
  { id: "vocabulaire",    label: "Vocabulaire",      icon: "📚", color: "#6a1b9a" },
  { id: "mes-erreurs",    label: "Mes erreurs",      icon: "🔴", color: "#b71c1c" },
  { id: "reformulation",  label: "Reformulation",    icon: "🔄", color: "#00695c" },
];

const LESSONS = [
  // ── Grammaire ──
  {
    file: "Grammaire/c-est-vs-il-est/index.html",
    title: "C'est vs Il est",
    titleFr: "Distinction essentielle TCF · A2→B2",
    category: "grammaire",
    level: "B1",
    icon: "⚖️",
    group: "Structures essentielles",
    disabled: false,
  },
  {
    file: "Grammaire/demonstratifs/index.html",
    title: "Adjectifs & Pronoms démonstratifs",
    titleFr: "ce / cet / cette · celui / celle / ceux",
    category: "grammaire",
    level: "B1/B2",
    icon: "👆",
    group: "Structures essentielles",
    disabled: false,
  },
  {
    file: "Grammaire/famille-de-mots/index.html",
    title: "Famille de mots",
    titleFr: "Adjectif → Verbe · simplifier · élargir · adoucir",
    category: "grammaire",
    level: "B1/B2",
    icon: "🌿",
    group: "Lexique & Formation",
    disabled: false,
  },
  {
    file: "Grammaire/liaison/index.html",
    title: "La Liaison",
    titleFr: "Obligatoire · Interdite · Phonétique",
    category: "grammaire",
    level: "B1/B2",
    icon: "🔗",
    group: "Lexique & Formation",
    disabled: false,
  },
  {
    file: "Grammaire/conditionnel/conditionnel-present/index.html",
    title: "Conditionnel présent",
    titleFr: "Formation, 5 emplois, règle du si",
    category: "grammaire",
    level: "B1",
    icon: "💭",
    group: "Conditionnel",
    disabled: false,
  },
  {
    file: "Grammaire/conditionnel/conditionnel-passe/index.html",
    title: "Conditionnel passé",
    titleFr: "Regrets, reproches, hypothèses",
    category: "grammaire",
    level: "B1/B2",
    icon: "⏳",
    group: "Conditionnel",
    disabled: false,
  },

  // ── Vocabulaire ──
  {
    file: "vocabulaire/index.html",
    title: "Vocabulaire TCF",
    titleFr: "Mots et expressions des sessions",
    category: "vocabulaire",
    level: "B1/B2",
    icon: "📚",
    group: "",
    disabled: false,
  },

  // ── Mes erreurs ──
  {
    file: "mes-erreurs/index.html",
    title: "Mes erreurs fréquentes",
    titleFr: "Erreurs corrigées et expliquées",
    category: "mes-erreurs",
    level: "B1",
    icon: "🔴",
    group: "",
    disabled: false,
  },

  // ── Reformulation ──
  {
    file: "reformulation/index.html",
    title: "Reformulation",
    titleFr: "Dire autrement — enrichir le discours",
    category: "reformulation",
    level: "B1",
    icon: "🔄",
    group: "",
    disabled: false,
  },
];

let currentCat = null;

function countCat(id) { return LESSONS.filter(l => l.category === id).length; }

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c => `
    <button class="cat-chip" style="--c:${c.color}" onclick="openCat('${c.id}')">
      <div class="chip-icon">${c.icon}</div>
      <div class="chip-body">
        <span class="name">${c.label}</span>
        <span class="num">${countCat(c.id)} contenu${countCat(c.id)>1?'s':''}</span>
      </div>
    </button>
  `).join('');
}

function buildCard(l) {
  const cat = CATEGORIES.find(c => c.id === l.category);
  if (l.disabled) {
    return `<div class="content-card" style="opacity:.45;cursor:not-allowed;">
      <div class="card-thumb"><span style="font-size:40px">🔒</span>${l.level?`<span class="card-level">${l.level}</span>`:''}</div>
      <div class="card-body"><div class="card-cat">${cat?.label}</div><div class="card-title">${l.title}</div><div class="card-title-fr">${l.titleFr}</div><div class="card-go">Bientôt… ⏳</div></div>
    </div>`;
  }
  return `<a class="content-card" href="${l.file}">
    <div class="card-thumb" style="background:${cat?.color}14"><span style="font-size:40px">${l.icon}</span>${l.level?`<span class="card-level">${l.level}</span>`:''}</div>
    <div class="card-body"><div class="card-cat">${cat?.label}</div><div class="card-title">${l.title}</div><div class="card-title-fr">${l.titleFr}</div><div class="card-go">Ouvrir →</div></div>
  </a>`;
}

function openCat(id) {
  currentCat = id;
  const cat = CATEGORIES.find(c => c.id === id);
  const items = LESSONS.filter(l => l.category === id);
  document.getElementById('hero').classList.add('hidden');
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('library').classList.add('active');
  document.getElementById('libTitle').textContent = `${cat?.icon} ${cat?.label}`;
  document.getElementById('libCount').textContent = `${items.length} contenu${items.length>1?'s':''}`;

  if (id === 'grammaire') {
    const groups = [...new Set(items.map(l => l.group))];
    document.getElementById('contentGrid').innerHTML = groups.map(g => {
      const gItems = items.filter(l => l.group === g);
      return `<div class="group-card">
        <div class="group-header">
          <span class="g-icon">${gItems[0].icon}</span>
          <div><div class="g-title">${g}</div><div class="g-sub">${gItems.length} leçon${gItems.length>1?'s':''}</div></div>
        </div>
        <div class="group-items">
          ${gItems.map(l => l.disabled
            ? `<div class="group-item locked"><span class="gi-icon">🔒</span><span class="gi-title">${l.title}</span><span style="font-size:11px;color:#94a3b8;">Bientôt</span></div>`
            : `<a class="group-item available" href="${l.file}"><span class="gi-icon">✅</span><span class="gi-title">${l.title} <span style="font-size:11px;font-weight:400;color:#64748b;font-style:italic;">${l.titleFr}</span></span><span class="gi-arrow">→</span></a>`
          ).join('')}
        </div>
      </div>`;
    }).join('');
  } else {
    document.getElementById('contentGrid').innerHTML = `<div class="content-grid">${items.map(buildCard).join('')}</div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome() {
  currentCat = null;
  document.getElementById('hero').classList.remove('hidden','shrink');
  document.getElementById('library').classList.remove('active');
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value = '';
  window.scrollTo({top:0,behavior:'smooth'});
}

function handleSearch(q) {
  q = q.trim();
  const hero = document.getElementById('hero');
  const lib = document.getElementById('library');
  const sr = document.getElementById('searchResults');
  if (!q) { sr.classList.remove('active'); if (!currentCat) { hero.classList.remove('shrink','hidden'); } return; }
  const ql = q.toLowerCase();
  const results = LESSONS.filter(l => l.title.includes(q) || l.titleFr?.toLowerCase().includes(ql) || l.category.includes(ql));
  lib.classList.remove('active');
  hero.classList.add('shrink'); hero.classList.remove('hidden');
  sr.classList.add('active');
  document.getElementById('srTitle').textContent = results.length ? `${results.length} résultat${results.length>1?'s':''} pour « ${q} »` : `Aucun résultat pour « ${q} »`;
  document.getElementById('searchGrid').innerHTML = results.map(buildCard).join('');
}

window.addEventListener('scroll', () => {
  document.getElementById('scrollBtn').classList.toggle('show', window.pageYOffset > 300);
});

buildCatGrid();
</script>
</body>
</html>
