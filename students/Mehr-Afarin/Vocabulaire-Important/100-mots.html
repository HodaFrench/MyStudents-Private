<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>100 mots essentiels A2 · مهرآفرین</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#c2185b;--pink-pale:#fce4ec;--pink-deep:#880e4f;
  --paper:#fdf5f8;--ink:#2c3e50;--gray:#64748b;--line:#f0d9e5;
  --green:#2e7d32;--green-pale:#e8f5e9;
  --blue:#1565c0;--blue-pale:#e3f2fd;
  --amber:#e65100;--amber-pale:#fff3e0;
  --purple:#6a1b9a;--purple-pale:#f3e5f5;
  --teal:#00695c;--teal-pale:#e0f2f1;
}
html{scroll-behavior:smooth;}
body{font-family:'Vazirmatn','Segoe UI',Tahoma,sans-serif;background:var(--paper);color:var(--ink);padding-bottom:80px;}

.topbar{background:var(--pink-deep);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.t-title{font-size:16px;font-weight:700;color:white;}
.t-sub{font-size:10px;color:rgba(255,255,255,.6);}
.back{margin-right:auto;color:rgba(255,255,255,.8);text-decoration:none;font-size:11px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:5px;}
.back:hover{background:var(--pink);}

.hero{background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:white;padding:44px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero-content{position:relative;z-index:1;}
.hero h1{font-family:'Roboto',sans-serif;font-size:clamp(22px,4vw,36px);font-weight:700;margin-bottom:8px;}
.hero-sub{font-size:14px;opacity:.85;margin-bottom:14px;}
.hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.hpill{background:rgba(255,255,255,.18);font-size:11px;padding:4px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.3);}

/* FILTERS */
.filter-bar{display:flex;overflow-x:auto;gap:8px;padding:14px 20px;background:white;border-bottom:2px solid var(--line);position:sticky;top:62px;z-index:99;}
.filter-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid var(--line);background:white;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:.2s;font-family:'Vazirmatn',sans-serif;}
.filter-btn:hover{border-color:var(--pink);color:var(--pink);}
.filter-btn.active{background:var(--pink);border-color:var(--pink);color:white;}

/* PROGRESS */
.progress-wrap{padding:10px 20px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.progress-label{font-size:11px;color:var(--gray);white-space:nowrap;}
.progress-bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4caf50);border-radius:3px;transition:width .4s;}

/* GRID */
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;}
.section-title{font-family:'Roboto',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin:28px 0 14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:"";flex:1;height:1px;background:var(--line);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

/* CARD */
.v-card{background:white;border:2px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;}
.v-card.hidden{display:none;}
.v-card:hover{border-color:var(--pink);box-shadow:0 4px 16px rgba(194,24,91,.1);}
.v-card.known{border-color:var(--green);background:#f9fff9;}

.card-top{display:flex;align-items:center;gap:0;}
.card-num{background:var(--pink);color:white;font-size:11px;font-weight:700;min-width:36px;height:52px;display:flex;align-items:center;justify-content:center;}
.card-word-wrap{padding:10px 14px;flex:1;}
.card-word{font-family:'Roboto',sans-serif;font-size:17px;font-weight:700;color:var(--pink-deep);direction:ltr;margin-bottom:2px;}
.card-meaning{font-size:12px;color:var(--gray);}
.card-type{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-left:auto;margin-right:10px;}
.type-verb{background:var(--blue-pale);color:var(--blue);}
.type-adj{background:var(--green-pale);color:var(--green);}
.type-adv{background:var(--amber-pale);color:var(--amber);}
.type-nom{background:var(--purple-pale);color:var(--purple);}
.type-exp{background:var(--teal-pale);color:var(--teal);}

.card-examples{padding:0;border-top:1px dashed var(--line);}
.ex{padding:8px 14px;border-bottom:1px dashed var(--line);font-size:13px;}
.ex:last-child{border:none;}
.ex-fr{direction:ltr;text-align:left;color:var(--ink);line-height:1.6;margin-bottom:2px;}
.ex-fr em{color:var(--pink-deep);font-style:normal;font-weight:700;background:rgba(194,24,91,.1);padding:0 2px;border-radius:2px;}
.ex-fa{font-size:11px;color:var(--gray);direction:rtl;text-align:right;line-height:1.6;}

.card-action{display:flex;border-top:1px solid var(--line);}
.know-btn{flex:1;padding:8px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--gray);font-family:'Vazirmatn',sans-serif;transition:.2s;}
.know-btn:hover{background:var(--green-pale);color:var(--green);}
.know-btn.known{background:var(--green-pale);color:var(--green);}

#scrollBtn{display:none;position:fixed;bottom:20px;right:20px;background:var(--pink);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:18px;}
#scrollBtn.show{display:block;}
.footer{text-align:center;padding:22px;color:var(--gray);font-size:11px;border-top:1px solid var(--line);margin-top:20px;}
.footer a{color:var(--pink);text-decoration:none;}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div style="font-size:22px;">🧠</div>
  <div><div class="t-title">۱۰۰ واژه ضروری A2</div><div class="t-sub">مهرآفرین · فعل · صفت · قید · اسم · عبارت</div></div>
  <a class="back" href="../index.html">← پرونده مهرآفرین</a>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>🧠 ۱۰۰ واژه ضروری</h1>
    <div class="hero-sub">فعل · صفت · قید · اسم · عبارت — برای حرف زدن راجع به هر موضوعی</div>
    <div class="hero-pills">
      <span class="hpill">📖 Niveau A2</span>
      <span class="hpill">100 mots</span>
      <span class="hpill">3 exemples chacun</span>
    </div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">همه (۱۰۰)</button>
  <button class="filter-btn" onclick="setFilter('verb',this)">🔵 فعل</button>
  <button class="filter-btn" onclick="setFilter('adj',this)">🟢 صفت</button>
  <button class="filter-btn" onclick="setFilter('adv',this)">🟠 قید</button>
  <button class="filter-btn" onclick="setFilter('nom',this)">🟣 اسم</button>
  <button class="filter-btn" onclick="setFilter('exp',this)">🩵 عبارت</button>
  <button class="filter-btn" onclick="setFilter('unknown',this)">⭕ بلد نیستم</button>
</div>

<div class="progress-wrap">
  <span class="progress-label">بلدم: <strong id="known-count">0</strong> / 100</span>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-label" id="progress-pct">۰٪</span>
</div>

<div class="wrap" id="main-wrap">

<script>
const WORDS = [
// ── VERBES (فعل) ──
{n:1,w:"parler",m:"حرف زدن · صحبت کردن",t:"verb",
 ex:[["Je <em>parle</em> français depuis six mois.","شش ماه است که فرانسه حرف می‌زنم."],
     ["Elle <em>parle</em> à voix basse pour ne pas réveiller le bébé.","آهسته حرف می‌زند تا بچه را بیدار نکند."],
     ["On peut en <em>parler</em> plus tard si tu veux.","اگر خواستی می‌توانیم بعداً از آن حرف بزنیم."]]},
{n:2,w:"écouter",m:"گوش دادن",t:"verb",
 ex:[["J'<em>écoute</em> de la musique en faisant le ménage.","موقع تمیز کردن موسیقی گوش می‌دهم."],
     ["Il ne m'<em>écoute</em> pas quand je lui parle.","وقتی باهاش حرف می‌زنم گوش نمی‌دهد."],
     ["<em>Écoute</em>-moi bien, c'est important.","خوب گوش بده، مهمه."]]},
{n:3,w:"comprendre",m:"فهمیدن · درک کردن",t:"verb",
 ex:[["Je ne <em>comprends</em> pas cette phrase.","این جمله را نمی‌فهمم."],
     ["Il <em>comprend</em> le français mais il ne parle pas encore.","فرانسه می‌فهمد اما هنوز حرف نمی‌زند."],
     ["Tu <em>comprends</em> pourquoi je suis en colère ?","می‌فهمی چرا عصبانی‌ام؟"]]},
{n:4,w:"expliquer",m:"توضیح دادن",t:"verb",
 ex:[["Peux-tu m'<em>expliquer</em> comment ça marche ?","می‌توانی توضیح دهی چطور کار می‌کند؟"],
     ["Il a <em>expliqué</em> la situation très clairement.","وضعیت را خیلی واضح توضیح داد."],
     ["Je ne sais pas comment <em>expliquer</em> ce que je ressens.","نمی‌دانم چطور توضیح دهم چه احساسی دارم."]]},
{n:5,w:"demander",m:"پرسیدن · خواستن",t:"verb",
 ex:[["Je veux lui <em>demander</em> un conseil.","می‌خواهم از او نظر بپرسم."],
     ["Elle a <em>demandé</em> de l'aide à ses collègues.","از همکارانش کمک خواست."],
     ["N'hésite pas à <em>demander</em> si tu as une question.","اگر سؤالی داشتی تردید نکن بپرسی."]]},
{n:6,w:"répondre",m:"جواب دادن",t:"verb",
 ex:[["Il n'a pas <em>répondu</em> à mon message.","جواب پیامم را نداد."],
     ["<em>Réponds</em> honnêtement : tu aimes ce plat ?","صادقانه جواب بده: این غذا را دوست داری؟"],
     ["Je ne sais pas quoi <em>répondre</em> dans cette situation.","نمی‌دانم در این وضعیت چه جوابی بدهم."]]},
{n:7,w:"penser",m:"فکر کردن · فکر کردن به",t:"verb",
 ex:[["Je <em>pense</em> que c'est une bonne idée.","فکر می‌کنم ایده خوبی است."],
     ["À quoi tu <em>penses</em> en ce moment ?","الان به چی فکر می‌کنی؟"],
     ["Il <em>pense</em> toujours aux autres avant lui.","همیشه قبل از خودش به دیگران فکر می‌کند."]]},
{n:8,w:"croire",m:"باور داشتن · فکر کردن",t:"verb",
 ex:[["Je <em>crois</em> qu'il a raison.","فکر می‌کنم حق با اوست."],
     ["Elle ne <em>croit</em> pas ce qu'il dit.","حرف‌هایش را باور نمی‌کند."],
     ["Tu <em>crois</em> vraiment que ça va marcher ?","واقعاً باور داری که کار می‌کند؟"]]},
{n:9,w:"savoir",m:"دانستن · بلد بودن",t:"verb",
 ex:[["Je ne <em>sais</em> pas où il habite.","نمی‌دانم کجا زندگی می‌کند."],
     ["Elle <em>sait</em> parler trois langues.","سه زبان بلد است."],
     ["<em>Sais</em>-tu cuisiner ?","آشپزی بلدی؟"]]},
{n:10,w:"vouloir",m:"خواستن",t:"verb",
 ex:[["Je <em>veux</em> apprendre le français.","می‌خواهم فرانسه یاد بگیرم."],
     ["Qu'est-ce que tu <em>veux</em> faire ce soir ?","امشب می‌خواهی چیکار کنی؟"],
     ["Il ne <em>voulait</em> pas partir, mais il le fallait.","نمی‌خواست برود، اما مجبور بود."]]},
{n:11,w:"pouvoir",m:"توانستن",t:"verb",
 ex:[["Tu <em>peux</em> m'aider s'il te plaît ?","می‌توانی کمکم کنی لطفاً؟"],
     ["Je ne <em>peux</em> pas venir demain.","فردا نمی‌توانم بیایم."],
     ["On <em>peut</em> tout apprendre avec de la patience.","با صبر می‌توان همه چیز یاد گرفت."]]},
{n:12,w:"devoir",m:"باید · مجبور بودن",t:"verb",
 ex:[["Je <em>dois</em> finir ce travail avant minuit.","باید قبل از نیمه‌شب این کار را تمام کنم."],
     ["Tu <em>dois</em> manger quelque chose, tu n'as rien pris depuis ce matin.","باید چیزی بخوری، از صبح هیچی نخورده‌ای."],
     ["On <em>doit</em> tous faire des efforts.","همه باید تلاش کنیم."]]},
{n:13,w:"changer",m:"تغییر دادن · تغییر کردن",t:"verb",
 ex:[["Il a beaucoup <em>changé</em> depuis la dernière fois.","از دفعه آخر خیلی تغییر کرده."],
     ["Je veux <em>changer</em> de travail.","می‌خواهم کارم را عوض کنم."],
     ["Rien ne <em>change</em> si on ne fait rien.","اگر کاری نکنیم هیچ چیز تغییر نمی‌کند."]]},
{n:14,w:"améliorer",m:"بهتر کردن · پیشرفت دادن",t:"verb",
 ex:[["Je veux <em>améliorer</em> mon niveau de français.","می‌خواهم سطح فرانسه‌ام را بهتر کنم."],
     ["Travailler ensemble a <em>amélioré</em> nos résultats.","کار با هم نتایجمان را بهتر کرد."],
     ["Il essaie d'<em>améliorer</em> ses habitudes chaque jour.","هر روز سعی می‌کند عادت‌هایش را بهتر کند."]]},
{n:15,w:"réussir",m:"موفق شدن",t:"verb",
 ex:[["Elle a <em>réussi</em> son examen du premier coup.","در اولین بار در امتحانش موفق شد."],
     ["Je suis sûr que tu vas <em>réussir</em>.","مطمئنم که موفق خواهی شد."],
     ["Pour <em>réussir</em>, il faut travailler et croire en soi.","برای موفق شدن باید کار کرد و به خود ایمان داشت."]]},
{n:16,w:"accepter",m:"قبول کردن · پذیرفتن",t:"verb",
 ex:[["Il a <em>accepté</em> l'invitation sans hésiter.","بدون تردید دعوت را قبول کرد."],
     ["J'ai du mal à <em>accepter</em> cette décision.","سخت است که این تصمیم را بپذیرم."],
     ["<em>Accepter</em> ses erreurs, c'est une forme de courage.","قبول کردن اشتباهاتت نوعی شجاعت است."]]},
{n:17,w:"refuser",m:"رد کردن · قبول نکردن",t:"verb",
 ex:[["Il a <em>refusé</em> de répondre à la question.","از پاسخ دادن به سؤال سر باز زد."],
     ["Elle a <em>refusé</em> l'offre sans donner d'explication.","پیشنهاد را بدون توضیح رد کرد."],
     ["Je ne peux pas <em>refuser</em> quand c'est ma famille.","وقتی خانواده‌ام است نمی‌توانم رد کنم."]]},
{n:18,w:"choisir",m:"انتخاب کردن",t:"verb",
 ex:[["Tu as <em>choisi</em> quoi comme dessert ?","چه دسری انتخاب کردی؟"],
     ["C'est difficile de <em>choisir</em> entre les deux.","انتخاب بین این دو سخت است."],
     ["Il a <em>choisi</em> de rester plutôt que de partir.","انتخاب کرد که بماند به جای رفتن."]]},
{n:19,w:"décider",m:"تصمیم گرفتن",t:"verb",
 ex:[["On a <em>décidé</em> de partir en vacances en juillet.","تصمیم گرفتیم جولای تعطیلات برویم."],
     ["Il est difficile de <em>décider</em> seul.","تنها تصمیم گرفتن سخت است."],
     ["J'ai <em>décidé</em> d'apprendre à cuisiner.","تصمیم گرفتم آشپزی یاد بگیرم."]]},
{n:20,w:"partager",m:"به اشتراک گذاشتن · تقسیم کردن",t:"verb",
 ex:[["On a <em>partagé</em> la pizza en quatre parts.","پیتزا را به چهار تکه تقسیم کردیم."],
     ["Elle aime <em>partager</em> ses photos sur les réseaux.","دوست دارد عکس‌هایش را در شبکه‌ها به اشتراک بگذارد."],
     ["<em>Partager</em> ses émotions avec quelqu'un, ça aide beaucoup.","احساساتت را با کسی در میان گذاشتن خیلی کمک می‌کند."]]},
{n:21,w:"oublier",m:"فراموش کردن",t:"verb",
 ex:[["J'ai <em>oublié</em> mon parapluie à la maison.","چترم را خانه جا گذاشتم."],
     ["N'<em>oublie</em> pas de fermer la porte à clé.","یادت نرود در را قفل کنی."],
     ["On n'<em>oublie</em> jamais sa première langue.","اولین زبانت را هیچ‌وقت فراموش نمی‌کنی."]]},
{n:22,w:"rappeler",m:"یادآوری کردن · به یاد آوردن",t:"verb",
 ex:[["Cette chanson me <em>rappelle</em> mon enfance.","این آهنگ دوران کودکی‌ام را به یادم می‌آورد."],
     ["Tu peux me <em>rappeler</em> son nom ?","می‌توانی اسمش را یادم بیندازی؟"],
     ["Je vais te <em>rappeler</em> à dix-neuf heures.","ساعت هفت دوباره زنگ می‌زنم."]]},
{n:23,w:"aider",m:"کمک کردن",t:"verb",
 ex:[["Peux-tu m'<em>aider</em> à porter ces sacs ?","می‌توانی کمک کنی این کیسه‌ها را حمل کنم؟"],
     ["Il <em>aide</em> toujours ses voisins quand ils ont besoin.","همیشه وقتی همسایه‌هایش نیاز داشته باشند کمک می‌کند."],
     ["Apprendre une langue <em>aide</em> à comprendre une autre culture.","یادگیری یک زبان به درک فرهنگ دیگر کمک می‌کند."]]},
{n:24,w:"essayer",m:"امتحان کردن · تلاش کردن",t:"verb",
 ex:[["J'ai <em>essayé</em> ce restaurant hier soir.","دیشب این رستوران را امتحان کردم."],
     ["Il <em>essaie</em> de parler français tous les jours.","هر روز سعی می‌کند فرانسه صحبت کند."],
     ["<em>Essaie</em> encore, tu vas y arriver.","دوباره امتحان کن، موفق خواهی شد."]]},
{n:25,w:"continuer",m:"ادامه دادن",t:"verb",
 ex:[["<em>Continue</em> comme ça, tu fais du bon travail.","همینطور ادامه بده، کار خوبی می‌کنی."],
     ["Il a <em>continué</em> ses études malgré les difficultés.","علی‌رغم مشکلات ادامه تحصیل داد."],
     ["Je ne peux pas <em>continuer</em> sans café le matin.","صبح‌ها بدون قهوه نمی‌توانم ادامه دهم."]]},
// ── ADJECTIFS (صفت) ──
{n:26,w:"important / importante",m:"مهم",t:"adj",
 ex:[["C'est une décision très <em>importante</em>.","این یک تصمیم خیلی مهم است."],
     ["L'essentiel, c'est de faire les choses <em>importantes</em> en premier.","اساسی اینه که کارهای مهم را اول انجام دهی."],
     ["Il joue un rôle <em>important</em> dans l'équipe.","نقش مهمی در تیم دارد."]]},
{n:27,w:"difficile",m:"سخت · دشوار",t:"adj",
 ex:[["Ce livre est un peu <em>difficile</em> pour mon niveau.","این کتاب برای سطحم کمی سخت است."],
     ["Les premières semaines sont toujours les plus <em>difficiles</em>.","هفته‌های اول همیشه سخت‌ترین هستند."],
     ["C'est <em>difficile</em>, mais pas impossible.","سخت است، اما غیرممکن نیست."]]},
{n:28,w:"facile",m:"آسان · راحت",t:"adj",

const knownSet = new Set(JSON.parse(localStorage.getItem('known100')||'[]'));
let currentFilter = 'all';

function saveKnown(){
  try{localStorage.setItem('known100',JSON.stringify([...knownSet]));}catch{}
  updateProgress();
}

function updateProgress(){
  const n = knownSet.size;
  document.getElementById('known-count').textContent = n;
  document.getElementById('progress-fill').style.width = n+'%';
  document.getElementById('progress-pct').textContent = n+'٪';
}

function toggleKnown(n){
  if(knownSet.has(n)) knownSet.delete(n);
  else knownSet.add(n);
  saveKnown();
  const card = document.getElementById('c'+n);
  const btn = card.querySelector('.know-btn');
  if(knownSet.has(n)){
    card.classList.add('known');
    btn.classList.add('known');
    btn.textContent = '✅ بلدم';
  }else{
    card.classList.remove('known');
    btn.classList.remove('known');
    btn.textContent = '○ بلد نیستم';
  }
  if(currentFilter==='unknown') applyFilter();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter(){
  document.querySelectorAll('.v-card').forEach(c=>{
    const t=c.dataset.type;
    const n=parseInt(c.dataset.n);
    let show=true;
    if(currentFilter!=='all'&&currentFilter!=='unknown') show=t===currentFilter;
    if(currentFilter==='unknown') show=!knownSet.has(n);
    c.classList.toggle('hidden',!show);
  });
}

const TYPE_LABELS = {verb:'🔵 فعل',adj:'🟢 صفت',adv:'🟠 قید',nom:'🟣 اسم',exp:'🩵 عبارت'};
const TYPE_SECTIONS = {verb:'🔵 فعل — verbes',adj:'🟢 صفت — adjectifs',adv:'🟠 قید — adverbes',nom:'🟣 اسم — noms',exp:'🩵 عبارت — expressions'};
const wrap = document.getElementById('main-wrap');
let lastType='';

WORDS.forEach(w=>{
  if(w.t!==lastType){
    const h=document.createElement('div');
    h.className='section-title';
    h.textContent=TYPE_SECTIONS[w.t];
    wrap.appendChild(h);
    const g=document.createElement('div');
    g.className='cards-grid';
    g.id='grid-'+w.t;
    wrap.appendChild(g);
    lastType=w.t;
  }
  const card=document.createElement('div');
  card.className='v-card'+(knownSet.has(w.n)?' known':'');
  card.id='c'+w.n;
  card.dataset.type=w.t;
  card.dataset.n=w.n;
  card.innerHTML=`
    <div class="card-top">
      <div class="card-num">${w.n}</div>
      <div class="card-word-wrap">
        <div class="card-word">${w.w}</div>
        <div class="card-meaning">${w.m}</div>
      </div>
      <div class="card-type type-${w.t}">${TYPE_LABELS[w.t]}</div>
    </div>
    <div class="card-examples">
      ${w.ex.map(e=>`<div class="ex"><div class="ex-fr">${e[0]}</div><div class="ex-fa">${e[1]}</div></div>`).join('')}
    </div>
    <div class="card-action">
      <button class="know-btn${knownSet.has(w.n)?' known':''}" onclick="toggleKnown(${w.n})">${knownSet.has(w.n)?'✅ بلدم':'○ بلد نیستم'}</button>
    </div>`;
  document.getElementById('grid-'+w.t).appendChild(card);
});

updateProgress();
