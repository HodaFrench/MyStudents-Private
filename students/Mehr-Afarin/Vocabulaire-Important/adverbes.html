<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#c2185b;--pink-pale:#fce4ec;--pink-deep:#880e4f;
  --paper:#fdf5f8;--ink:#2c3e50;--gray:#64748b;--line:#f0d9e5;
  --c1:#1565c0;--c1p:#e3f2fd; /* manière */
  --c2:#2e7d32;--c2p:#e8f5e9; /* temps */
  --c3:#6a1b9a;--c3p:#f3e5f5; /* fréquence */
  --c4:#e65100;--c4p:#fff3e0; /* intensité */
  --c5:#00695c;--c5p:#e0f2f1; /* lieu */
  --c6:#c62828;--c6p:#ffebee; /* liaison */
  --navy:#0d1b2a;
}
html{scroll-behavior:smooth;}
body{font-family:'Vazirmatn','Segoe UI',sans-serif;background:var(--paper);color:var(--ink);padding-bottom:80px;}

/* TOPBAR */
.topbar{background:var(--pink-deep);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.t-title{font-size:15px;font-weight:700;color:white;}
.t-sub{font-size:10px;color:rgba(255,255,255,.6);}
.back{margin-right:auto;color:rgba(255,255,255,.8);text-decoration:none;font-size:11px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:5px;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--pink-deep),#ad1457);color:white;padding:42px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero-content{position:relative;z-index:1;}
.hero-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;background:rgba(255,255,255,.2);padding:4px 14px;border-radius:12px;display:inline-block;margin-bottom:10px;}
.hero h1{font-family:'Roboto',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:700;margin-bottom:6px;}
.hero-sub{font-size:13px;opacity:.85;margin-bottom:14px;}
.hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.hpill{background:rgba(255,255,255,.18);font-size:11px;padding:4px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.3);}

/* FILTER BAR */
.filter-bar{display:flex;overflow-x:auto;gap:8px;padding:13px 20px;background:white;border-bottom:2px solid var(--line);position:sticky;top:62px;z-index:99;}
.fbtn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid var(--line);background:white;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:.2s;font-family:'Vazirmatn',sans-serif;}
.fbtn:hover,.fbtn.active{background:var(--pink);border-color:var(--pink);color:white;}

/* MAIN */
.wrap{max-width:960px;margin:0 auto;padding:24px 20px;}
.sec-head{font-family:'Roboto',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin:28px 0 14px;display:flex;align-items:center;gap:10px;}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}

/* ADV CARD */
.adv-card{background:white;border:2px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;}
.adv-card.hidden{display:none;}
.adv-card:hover{box-shadow:0 4px 18px rgba(194,24,91,.1);border-color:var(--pink);}

.card-top{display:flex;align-items:stretch;}
.card-num{min-width:42px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;}
.card-info{padding:12px 14px;border-bottom:1px solid var(--line);flex:1;}
.card-word{font-family:'Roboto',sans-serif;font-size:19px;font-weight:700;direction:ltr;margin-bottom:3px;}
.card-fa{font-size:12px;color:var(--gray);margin-bottom:4px;}
.card-alt{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:6px;display:inline-block;margin-top:2px;}
.cat-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;margin-left:auto;margin-top:6px;margin-right:8px;align-self:center;}

/* EXAMPLES */
.card-exs{padding:0;}
.ex{padding:10px 14px;border-bottom:1px dashed var(--line);}
.ex:last-child{border:none;}
.ex-fr{font-family:'Roboto',sans-serif;font-size:13.5px;direction:ltr;text-align:left;line-height:1.7;color:var(--ink);margin-bottom:3px;}
.ex-fr strong{text-decoration:underline;text-underline-offset:3px;}
.ex-fa{font-size:11.5px;color:var(--gray);direction:rtl;text-align:right;line-height:1.65;}

/* UPGRADE NOTE */
.upgrade{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--paper);border-top:1px solid var(--line);font-size:11px;color:var(--gray);direction:rtl;}
.upgrade strong{color:var(--pink-deep);}

/* COLORS per category */
.c1 .card-num{background:var(--c1);} .c1 .card-word{color:var(--c1);}
.c1 .card-alt{background:var(--c1p);color:var(--c1);}
.c1 .cat-badge{background:var(--c1p);color:var(--c1);}

.c2 .card-num{background:var(--c2);} .c2 .card-word{color:var(--c2);}
.c2 .card-alt{background:var(--c2p);color:var(--c2);}
.c2 .cat-badge{background:var(--c2p);color:var(--c2);}

.c3 .card-num{background:var(--c3);} .c3 .card-word{color:var(--c3);}
.c3 .card-alt{background:var(--c3p);color:var(--c3);}
.c3 .cat-badge{background:var(--c3p);color:var(--c3);}

.c4 .card-num{background:var(--c4);} .c4 .card-word{color:var(--c4);}
.c4 .card-alt{background:var(--c4p);color:var(--c4);}
.c4 .cat-badge{background:var(--c4p);color:var(--c4);}

.c5 .card-num{background:var(--c5);} .c5 .card-word{color:var(--c5);}
.c5 .card-alt{background:var(--c5p);color:var(--c5);}
.c5 .cat-badge{background:var(--c5p);color:var(--c5);}

.c6 .card-num{background:var(--c6);} .c6 .card-word{color:var(--c6);}
.c6 .card-alt{background:var(--c6p);color:var(--c6);}
.c6 .cat-badge{background:var(--c6p);color:var(--c6);}

#scrollBtn{display:none;position:fixed;bottom:20px;right:20px;background:var(--pink);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:18px;}
#scrollBtn.show{display:block;}
.footer{text-align:center;padding:22px;color:var(--gray);font-size:11px;border-top:1px solid var(--line);margin-top:10px;}
.footer a{color:var(--pink);text-decoration:none;}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}
</style>

// Build cards
const wrap = document.getElementById('cards-wrap');
let lastCat = '';

DATA.forEach(d => {
  if(d.cat !== lastCat) {
    const sh = document.createElement('div');
    sh.className = 'sec-head';
    sh.dataset.cat = d.cat;
    sh.textContent = CAT_TITLES[d.cat];
    wrap.appendChild(sh);

    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    grid.id = 'grid-'+d.cat;
    wrap.appendChild(grid);
    lastCat = d.cat;
  }

  const card = document.createElement('div');
  card.className = `adv-card ${d.cat}`;
  card.dataset.cat = d.cat;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-num">${d.n}</div>
      <div class="card-info">
        <div class="card-word">${d.word}</div>
        <div class="card-fa">${d.fa}</div>
        <div class="card-alt">${d.alt}</div>
      </div>
      <div class="cat-badge">${CAT_LABELS[d.cat]}</div>
    </div>
    <div class="card-exs">
      ${d.ex.map(e=>`
        <div class="ex">
          <div class="ex-fr">${e.fr}</div>
          <div class="ex-fa">${e.fa}</div>
        </div>`).join('')}
    </div>
    <div class="upgrade">💡 <strong>${d.word}</strong> — ${d.upgrade}</div>`;

  document.getElementById('grid-'+d.cat).appendChild(card);
});

// Filter
let cur = 'all';
function setFilter(f, btn) {
  cur = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.adv-card').forEach(c=>{
    c.classList.toggle('hidden', f!=='all' && c.dataset.cat!==f);
  });
  document.querySelectorAll('.sec-head,.cards-grid').forEach(el=>{
    if(el.dataset.cat || el.id.startsWith('grid-')) {
      const cat = el.dataset.cat || el.id.replace('grid-','');
      el.style.display = (f==='all' || f===cat) ? '' : 'none';
    }
  });
}
window.addEventListener('scroll',()=>document.getElementById('scrollBtn').classList.toggle('show',scrollY>300));
</script>
