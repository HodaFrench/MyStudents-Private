<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#c2185b;--pink-pale:#fce4ec;--pink-deep:#880e4f;
  --paper:#fdf5f8;--ink:#2c3e50;--gray:#64748b;--line:#f0d9e5;
  --c1:#6a1b9a;--c1p:#f3e5f5; /* lieux culturels */
  --c2:#1565c0;--c2p:#e3f2fd; /* sortir */
  --c3:#2e7d32;--c3p:#e8f5e9; /* plein air */
  --c4:#e65100;--c4p:#fff3e0; /* intérieur */
  --c5:#00695c;--c5p:#e0f2f1; /* pratiquer */
  --navy:#0d1b2a;
}
html{scroll-behavior:smooth;}
body{font-family:'Vazirmatn','Segoe UI',sans-serif;background:var(--paper);color:var(--ink);padding-bottom:80px;}

.topbar{background:var(--pink-deep);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.t-title{font-size:15px;font-weight:700;color:white;}
.t-sub{font-size:10px;color:rgba(255,255,255,.6);}
.back{margin-right:auto;color:rgba(255,255,255,.8);text-decoration:none;font-size:11px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:5px;}

.hero{background:linear-gradient(135deg,var(--pink-deep),#ad1457);color:white;padding:40px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero-content{position:relative;z-index:1;}
.hero-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;background:rgba(255,255,255,.2);padding:4px 14px;border-radius:12px;display:inline-block;margin-bottom:10px;}
.hero h1{font-family:'Roboto',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;margin-bottom:6px;}
.hero-sub{font-size:13px;opacity:.85;margin-bottom:14px;}
.hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.hpill{background:rgba(255,255,255,.18);font-size:11px;padding:4px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.3);}

/* FILTER */
.filter-bar{display:flex;overflow-x:auto;gap:8px;padding:13px 20px;background:white;border-bottom:2px solid var(--line);position:sticky;top:62px;z-index:99;}
.fbtn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid var(--line);background:white;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:.2s;font-family:'Vazirmatn',sans-serif;}
.fbtn:hover,.fbtn.active{background:var(--pink);border-color:var(--pink);color:white;}

.wrap{max-width:960px;margin:0 auto;padding:24px 20px;}
.sec{margin-bottom:14px;}
.sec-head{font-family:'Roboto',sans-serif;font-size:13px;font-weight:700;letter-spacing:.03em;margin:24px 0 14px;display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;}
.sec-head .count{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 10px;border-radius:8px;background:rgba(255,255,255,.7);}
.sec-head.c1{background:var(--c1p);color:var(--c1);}
.sec-head.c2{background:var(--c2p);color:var(--c2);}
.sec-head.c3{background:var(--c3p);color:var(--c3);}
.sec-head.c4{background:var(--c4p);color:var(--c4);}
.sec-head.c5{background:var(--c5p);color:var(--c5);}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}

.vcard{background:white;border:2px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;}
.vcard.hidden{display:none;}
.vcard:hover{box-shadow:0 4px 16px rgba(194,24,91,.1);border-color:var(--pink);}
.vcard-top{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
.vcard-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.vcard-word{font-family:'Roboto',sans-serif;font-size:16px;font-weight:700;direction:ltr;}
.vcard-fa{font-size:12px;color:var(--gray);margin-top:2px;direction:rtl;}
.vcard-ex{padding:11px 14px;}
.vcard-ex-fr{font-family:'Roboto',sans-serif;font-size:13px;line-height:1.7;direction:ltr;color:var(--ink);margin-bottom:4px;}
.vcard-ex-fr strong{color:var(--pink-deep);}
.vcard-ex-fa{font-size:11.5px;color:var(--gray);direction:rtl;text-align:right;line-height:1.6;}

/* colors per cat */
.i1{background:var(--c1p);}.w1{color:var(--c1);}
.i2{background:var(--c2p);}.w2{color:var(--c2);}
.i3{background:var(--c3p);}.w3{color:var(--c3);}
.i4{background:var(--c4p);}.w4{color:var(--c4);}
.i5{background:var(--c5p);}.w5{color:var(--c5);}

/* note */
.vnote{background:var(--c5p);border:1px solid rgba(0,105,92,.2);border-radius:8px;padding:6px 12px;margin-top:8px;font-size:11px;color:var(--c5);direction:rtl;text-align:right;line-height:1.6;}

#scrollBtn{display:none;position:fixed;bottom:20px;right:20px;background:var(--pink);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:18px;}
#scrollBtn.show{display:block;}
.footer{text-align:center;padding:22px;color:var(--gray);font-size:11px;border-top:1px solid var(--line);margin-top:10px;}
.footer a{color:var(--pink);text-decoration:none;}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}
</style>
</head>

 faE:'مادربزرگم باغبانی را دوست دارد، هر بهار گل می‌کارد.'},
{cat:'c3',icon:'⛰️',word:'la via ferrata',fa:'ویا فراتا (مسیر کوهنوردی با تجهیزات)',
 fr:'La <strong>via ferrata</strong> est accessible à tous, même aux débutants avec un guide.',
 faE:'ویا فراتا برای همه در دسترس است، حتی مبتدی‌ها با یک راهنما.'},
{cat:'c3',icon:'🏄',word:'le (stand-up) paddle',fa:'پدل‌بوردینگ (ایستاده روی تخته)',
 fr:'Sur le lac, on peut faire <strong>du paddle</strong> quand l\'eau est calme.',
 faE:'روی دریاچه، وقتی آب آرام است می‌توان پدل‌بوردینگ کرد.'},

// ── C4: À L'INTÉRIEUR ──
{cat:'c4',icon:'🔨',word:'le bricolage',fa:'کاردستی · تعمیرات خانگی',

const wrap = document.getElementById('wrap');
let lastCat='';
DATA.forEach(d=>{
  if(d.cat!==lastCat){
    const sh=document.createElement('div');
    sh.className='sec-head '+d.cat;
    sh.dataset.cat=d.cat;
    const cnt=DATA.filter(x=>x.cat===d.cat).length;
    sh.innerHTML=`<span>${CATS[d.cat].label}</span><span class="count">${cnt}</span>`;
    wrap.appendChild(sh);
    const g=document.createElement('div');
    g.className='cards-grid';g.id='g-'+d.cat;g.dataset.cat=d.cat;
    wrap.appendChild(g);
    lastCat=d.cat;
  }
  const n=d.cat.slice(1);
  const card=document.createElement('div');
  card.className='vcard';card.dataset.cat=d.cat;
  card.innerHTML=`
    <div class="vcard-top">
      <div class="vcard-icon i${n}">${d.icon}</div>
      <div><div class="vcard-word w${n}">${d.word}</div><div class="vcard-fa">${d.fa}</div></div>
    </div>
    <div class="vcard-ex">
      <div class="vcard-ex-fr">${d.fr}</div>
      <div class="vcard-ex-fa">${d.faE}</div>
      ${d.note?`<div class="vnote">💡 ${d.note}</div>`:''}
    </div>`;
  document.getElementById('g-'+d.cat).appendChild(card);
});

function setF(f,btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.vcard').forEach(c=>c.classList.toggle('hidden',f!=='all'&&c.dataset.cat!==f));
  document.querySelectorAll('.sec-head,.cards-grid').forEach(el=>{
    el.style.display=(f==='all'||f===el.dataset.cat)?'':'none';
  });
}
window.addEventListener('scroll',()=>document.getElementById('scrollBtn').classList.toggle('show',scrollY>300));
</script>
</body>
</html>
