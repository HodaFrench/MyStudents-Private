<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Édito B1 · Chapitre 3 — Shiva</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#c2185b;--pink-deep:#880e4f;--pink-pale:#fce4ec;--paper:#fdf5f8;--ink:#2c2a26;--gray:#8a8275;--line:#f0d9e5;}
html{scroll-behavior:smooth;}
body{font-family:'Estedad','Tahoma',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.topbar{background:#fffafe;border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar .logo{font-size:22px;}
.topbar h1{font-size:17px;color:var(--pink-deep);font-family:'Roboto',sans-serif;}
.topbar .fa{font-size:11px;color:var(--gray);}
.back{margin-right:auto;color:var(--pink);text-decoration:none;font-size:12px;background:var(--pink-pale);padding:6px 14px;border-radius:8px;}
.hero{background:linear-gradient(135deg,var(--pink-deep),#ad1457);color:white;padding:60px 24px;text-align:center;}
.hero .badge{font-family:'Roboto',monospace;font-size:10px;letter-spacing:.2em;background:rgba(255,255,255,.2);padding:5px 16px;border-radius:14px;display:inline-block;margin-bottom:14px;}
.hero h2{font-size:34px;font-weight:700;margin-bottom:10px;}
.hero p{font-size:14px;opacity:.85;}
.wrap{max-width:700px;margin:0 auto;padding:40px 24px;}
.empty-box{background:white;border:2px dashed var(--line);border-radius:16px;padding:50px 30px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;color:var(--pink-deep);margin-bottom:10px;}
.empty-text{font-size:13px;color:var(--gray);line-height:1.9;}
.footer{text-align:center;padding:24px;color:var(--gray);font-size:11px;border-top:1px solid var(--line);}
.footer a{color:var(--pink);text-decoration:none;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">💗</div>
  <div><h1>Édito B1 · Chapitre 3</h1><div class="fa">شیوا · Français avec Hoda</div></div>
  <a class="back" href="../../index.html">← بازگشت</a>
</div>
<div class="hero">
  <div class="badge">ÉDITO B1 · CHAPITRE 3</div>
  <h2>فصل 3</h2>
  <p>Édito B1 — Français avec Hoda</p>
</div>
<div class="wrap">
  <div class="empty-box">
    <div class="empty-icon">📕</div>
    <div class="empty-title">این فصل به‌زودی تکمیل می‌شود</div>
    <div class="empty-text">محتوای این فصل (واژگان، گرامر، متن و تمرین) در جلسات آینده اضافه خواهد شد.</div>
  </div>
</div>
<div class="footer"><a href="../../index.html">← صفحه شیوا</a> · Édito B1 · Français avec Hoda © 2025</div>
</body>
</html>
