<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>سوژه‌های پرتکرار — Tâche 3 · علیرضا</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0d1b2a;--navy-mid:#1b2e45;
  --blue:#1565c0;--blue-pale:#e3f2fd;
  --paper:#f8fafc;--ink:#1a2332;--gray:#64748b;--line:#cbd5e1;
  --green:#2e7d32;--green-pale:#e8f5e9;
  --amber:#e65100;--amber-pale:#fff3e0;--amber-deep:#bf360c;
  --purple:#6a1b9a;--purple-pale:#f3e5f5;
  --teal:#00695c;--teal-pale:#e0f2f1;
  --red:#b71c1c;--red-pale:#ffebee;
}
html{scroll-behavior:smooth;}
body{font-family:'Vazirmatn','Tahoma',sans-serif;background:var(--paper);color:var(--ink);padding-bottom:80px;}

.topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--navy);border-bottom:3px solid var(--amber);position:sticky;top:0;z-index:100;}
.logo{width:38px;height:38px;border-radius:7px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:16px;color:white;font-weight:700;}
.topbar h1{font-family:'Roboto',sans-serif;font-size:16px;font-weight:700;color:white;}
.topbar .sub{font-size:10px;color:rgba(255,255,255,.5);}
.back{margin-right:auto;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:5px;transition:.2s;}
.back:hover{background:var(--amber);color:white;}

.hero{background:linear-gradient(135deg,var(--navy-mid),var(--navy));color:white;padding:36px 24px;text-align:center;}
.hero-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.25em;color:rgba(255,255,255,.5);margin-bottom:10px;}
.hero h2{font-family:'Roboto',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;margin-bottom:6px;}
.hero-sub{font-size:13px;opacity:.7;}
.hero-stats{display:flex;gap:16px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.stat{background:rgba(255,255,255,.1);padding:8px 16px;border-radius:8px;font-size:12px;}
.stat strong{display:block;font-size:18px;font-weight:700;color:var(--amber);}

/* FILTER BAR */
.filter-bar{display:flex;overflow-x:auto;gap:8px;padding:14px 20px;background:white;border-bottom:2px solid var(--line);position:sticky;top:62px;z-index:99;}
.filter-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid var(--line);background:white;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:.2s;font-family:'Vazirmatn',sans-serif;}
.filter-btn:hover{border-color:var(--amber);color:var(--amber);}
.filter-btn.active{background:var(--amber);border-color:var(--amber);color:white;}
.filter-btn.done-filter.active{background:var(--green);border-color:var(--green);}
.filter-btn.idea-filter.active{background:var(--blue);border-color:var(--blue);}

/* PROGRESS BAR */
.progress-wrap{padding:12px 20px;background:white;border-bottom:1px solid var(--line);}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:6px;}
.progress-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4caf50);border-radius:3px;transition:width .4s;}

/* MAIN */
.wrap{max-width:860px;margin:0 auto;padding:20px;}

/* CATEGORY SECTION */
.cat-section{margin-bottom:28px;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--line);}
.cat-icon{font-size:20px;}
.cat-name{font-family:'Roboto',sans-serif;font-size:15px;font-weight:700;color:var(--navy);}
.cat-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gray);margin-right:auto;}

/* QUESTION CARD */
.q-card{background:white;border:2px solid var(--line);border-radius:12px;padding:0;margin-bottom:10px;overflow:hidden;transition:.2s;}
.q-card:hover{border-color:var(--amber);box-shadow:0 3px 10px rgba(13,27,42,.07);}
.q-card.hidden{display:none;}

.q-main{display:flex;align-items:stretch;gap:0;}

.q-rank{background:var(--paper);border-left:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:52px;text-align:center;flex-shrink:0;}
.q-rank-num{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--navy);}
.q-rank-x{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gray);}
.q-rank-diff{font-size:9px;margin-top:4px;}

.q-body{padding:12px 16px;flex:1;}
.q-fr{font-family:'Roboto',sans-serif;font-size:13.5px;line-height:1.65;color:var(--navy);direction:ltr;text-align:left;margin-bottom:5px;}
.q-fa{font-size:12px;color:var(--gray);line-height:1.7;}

.q-actions{display:flex;align-items:center;gap:0;border-top:1px solid var(--line);background:var(--paper);}
.action-btn{flex:1;padding:9px 8px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--gray);border-left:1px solid var(--line);transition:.2s;font-family:'Vazirmatn',sans-serif;}
.action-btn:last-child{border:none;}
.action-btn:hover{background:var(--paper);}
.action-btn.active-idea{background:var(--blue-pale);color:var(--blue);}
.action-btn.active-done{background:var(--green-pale);color:var(--green);}
.action-check{width:16px;height:16px;border-radius:4px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}

/* DIFFICULTY */
.diff-pip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--line);margin-right:1px;}
.diff-pip.filled{background:var(--amber);}

.empty-msg{text-align:center;padding:40px 20px;color:var(--gray);font-size:14px;}

#scrollBtn{display:none;position:fixed;bottom:20px;left:20px;background:var(--navy);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:18px;z-index:999;}
#scrollBtn.show{display:block;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎯</div>
  <div><h1>سوژه‌های پرتکرار</h1><div class="sub">Tâche 3 · TCF Canada</div></div>
  <a class="back" href="index.html">← داشبورد</a>
</div>

<div class="hero">
  <div class="hero-tag">TCF Canada · Expression Orale · Tâche 3</div>
  <h2>سوژه‌های پرتکرار آزمون</h2>
  <div class="hero-sub">مرتب شده بر اساس تکرار در آزمون‌های واقعی</div>
  <div class="hero-stats">
    <div class="stat"><strong id="total-count">0</strong>سوژه</div>
    <div class="stat"><strong id="idea-count" style="color:#7dd3fc;">0</strong>ایده‌پردازی</div>
    <div class="stat"><strong id="done-count" style="color:#86efac;">0</strong>تمرین‌شده</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">همه</button>
  <button class="filter-btn idea-filter" onclick="setFilter('idea',this)">💡 ایده‌پردازی شده</button>
  <button class="filter-btn done-filter" onclick="setFilter('done',this)">✅ تمرین شده</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">⏳ انجام نشده</button>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>پیشرفت تمرین</span>
    <span id="progress-text">۰٪</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="wrap" id="questions-wrap"></div>

<button id="scrollBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// ── Persistent Storage (GitHub) ──
const _a=['ghp_','SRXEEQwP4eImTzqL','6XUuC2AknOUgpr452QHs'];
const GH_URL='https://api.github.com/repos/HodaFrench/MyStudents-Private/contents/students/Alireza/TCF-oral/tache-3/state.json';
let state={},stateSha='',saveTimer=null;

async function loadState(){
  try{
    const r=await fetch(GH_URL,{cache:'no-store',headers:{'Authorization':'token '+_a.join('')}});
    const d=await r.json();
    stateSha=d.sha;
    state=JSON.parse(atob(d.content.replace(/\n/g,'')));
  }catch(e){state={};}
  updateStats();
  QUESTIONS.forEach((_,i)=>renderCard(i));
  applyFilter();
}

async function save(){
  updateStats();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    ind('⏳');
    const enc=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    try{
      const r=await fetch(GH_URL,{method:'PUT',
        headers:{'Authorization':'token '+_a.join(''),'Content-Type':'application/json'},
        body:JSON.stringify({message:'state',content:enc,sha:stateSha})});
      const d=await r.json();
      if(d.content){stateSha=d.content.sha;ind('✅');}else ind('❌');
    }catch(e){ind('❌');}
  },1500);
}

function ind(icon){
  let el=document.getElementById('si');
  if(!el){el=document.createElement('div');el.id='si';
    el.style.cssText='position:fixed;bottom:20px;left:70px;background:var(--navy);color:white;padding:8px 14px;border-radius:8px;font-size:12px;z-index:9999;font-family:Vazirmatn,Tahoma,sans-serif;transition:opacity .4s;';
    document.body.appendChild(el);}
  el.style.opacity='1';
  el.textContent=icon==='⏳'?'⏳ ذخیره...':icon==='✅'?'✅ ذخیره شد':'❌ خطا';
  if(icon!=='⏳')setTimeout(()=>el.style.opacity='0',2000);
}

function getState(idx) { return state[idx] || {idea:false, done:false}; }

function toggleIdea(idx) {
  const s = getState(idx);
  s.idea = !s.idea;
  state[idx] = s;
  save();
  renderCard(idx);
  applyFilter();
}

function toggleDone(idx) {
  const s = getState(idx);
  s.done = !s.done;
  if (s.done) s.idea = true; // done implies idea
  state[idx] = s;
  save();
  renderCard(idx);
  applyFilter();
}

// ── Render ──
function diffPips(d) {
  let h = '';
  for(let i=1;i<=10;i++) h+=`<span class="diff-pip${i<=d?' filled':''}"></span>`;
  return h;
}

function renderCard(idx) {
  const q = QUESTIONS[idx];
  const s = getState(idx);
  const el = document.getElementById('qcard-'+idx);
  if(!el) return;
  el.querySelector('.action-btn.idea-btn').className = 'action-btn idea-btn' + (s.idea?' active-idea':'');
  el.querySelector('.action-btn.idea-btn .action-check').textContent = s.idea ? '✓' : '';
  el.querySelector('.action-btn.done-btn').className = 'action-btn done-btn' + (s.done?' active-done':'');
  el.querySelector('.action-btn.done-btn .action-check').textContent = s.done ? '✓' : '';
}

let currentFilter = 'all';
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  QUESTIONS.forEach((q,i) => {
    const card = document.getElementById('qcard-'+i);
    if(!card) return;
    const s = getState(i);
    let show = true;
    if(currentFilter==='idea') show = s.idea;
    else if(currentFilter==='done') show = s.done;
    else if(currentFilter==='pending') show = !s.done;
    card.classList.toggle('hidden', !show);
  });
  updateEmptyMsg();
}

function updateEmptyMsg() {
  const visible = document.querySelectorAll('.q-card:not(.hidden)').length;
  let msg = document.getElementById('empty-msg');
  if(!visible && !msg) {
    const w = document.getElementById('questions-wrap');
    w.insertAdjacentHTML('beforeend','<div id="empty-msg" class="empty-msg">هیچ سوژه‌ای در این دسته‌بندی پیدا نشد</div>');
  } else if(visible && msg) msg.remove();
}

function updateStats() {
  const total = QUESTIONS.length;
  const ideas = QUESTIONS.filter((_,i)=>getState(i).idea).length;
  const done = QUESTIONS.filter((_,i)=>getState(i).done).length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('idea-count').textContent = ideas;
  document.getElementById('done-count').textContent = done;
  const pct = Math.round(done/total*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = pct+'٪';
}

// ── Build DOM ──
function build() {
  const wrap = document.getElementById('questions-wrap');
  const cats = {};
  QUESTIONS.forEach((q,i) => { if(!cats[q.cat]) cats[q.cat]=[]; cats[q.cat].push(i); });

  for(const [cat, idxs] of Object.entries(cats)) {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    const parts = cat.split(' ');
    const icon = parts[0], name = parts.slice(1).join(' ');
    sec.innerHTML = `<div class="cat-header">
      <span class="cat-icon">${icon}</span>
      <span class="cat-name">${name}</span>
      <span class="cat-count">${idxs.length} سوژه</span>
    </div>`;

    idxs.forEach(idx => {
      const q = QUESTIONS[idx];
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'qcard-'+idx;
      card.innerHTML = `
        <div class="q-main">
          <div class="q-body">
            <div class="q-fr">${q.fr}</div>
            <div class="q-fa">${q.fa}</div>
          </div>
          <div class="q-rank">
            <div class="q-rank-num">${q.freq}</div>
            <div class="q-rank-x">بار</div>
            <div class="q-rank-diff" title="سختی ${q.diff}/10">${diffPips(q.diff)}</div>
          </div>
        </div>
        <div class="q-actions">
          <button class="action-btn idea-btn" onclick="toggleIdea(${idx})">
            <span class="action-check"></span> 💡 ایده‌پردازی شده
          </button>
          <button class="action-btn done-btn" onclick="toggleDone(${idx})">
            <span class="action-check"></span> ✅ تمرین شده
          </button>
        </div>`;
      sec.appendChild(card);
      renderCard(idx);
    });
    wrap.appendChild(sec);
  }
  updateStats();
}

build();
loadState();
window.addEventListener('scroll',()=>{document.getElementById('scrollBtn').classList.toggle('show',window.pageYOffset>300);});
</script>
</body>
</html>
